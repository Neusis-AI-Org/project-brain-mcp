name: Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: mcp-neusis-project-brain
  REGISTRY: ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY" --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="$REGISTRY/$PROJECT_ID/mcp-project-brain/$SERVICE_NAME:${{ github.sha }}"
          docker build -t "$IMAGE" -t "$REGISTRY/$PROJECT_ID/mcp-project-brain/$SERVICE_NAME:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$PROJECT_ID/mcp-project-brain/$SERVICE_NAME:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --port=8082
            --args=http,--toolsets=knowledge_base
            --allow-unauthenticated

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" --region="$REGION" --format="value(status.url)")
          echo "## Deployed to Cloud Run" >> "$GITHUB_STEP_SUMMARY"
          echo "Service URL: $URL" >> "$GITHUB_STEP_SUMMARY"
